<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mountly — quickstart host</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      #mount {
        margin-top: 1rem;
        min-width: 320px;
        min-height: 240px;
        border: 1px dashed #94a3b8;
        border-radius: 8px;
      }
    </style>
    <!--
      Serve the REPOSITORY ROOT (not this file alone), e.g.:
        cd docs/examples/plain-html && pnpm dev
      then open:
        http://localhost:5175/docs/examples/quickstart/host.html

      1) Import map — bare specifiers → built files on disk.
      2) mountly — core runtime (createOnDemandFeature, etc.).
      3) payment-breakdown — example widget (self-contained build includes React).
      4) Script — attach hover-preload + click-mount to a trigger + mount slot.
    -->
    <script type="importmap">
      {
        "imports": {
          "mountly": "/packages/mountly/dist/index.js",
          "mountly/shadow": "/packages/mountly/dist/shadow.js",
          "mountly/assets": "/packages/mountly/dist/assets.js",
          "mountly/adapter": "/packages/mountly/dist/adapter.js",
          "mountly/attach": "/packages/mountly/dist/attach.js",
          "mountly/elements": "/packages/mountly/dist/elements.js",
          "mountly/bundle": "/packages/mountly/dist/bundle.js",
          "mountly/island": "/packages/mountly/dist/island.js",
          "mountly/mount": "/packages/mountly/dist/mount.js",
          "mountly/runtime": "/packages/mountly/dist/runtime.js",
          "mountly/triggers": "/packages/mountly/dist/triggers.js",
          "mountly/url": "/packages/mountly/dist/url-state.js",
          "mountly/data": "/packages/mountly/dist/data-source.js",
          "mountly/bus": "/packages/mountly/dist/bus.js",
          "payment-breakdown": "/docs/examples/payment-breakdown/dist/index.js"
        }
      }
    </script>
  </head>
  <body>
    <h1>mountly quickstart</h1>
    <p>Hover the button to preload; click to mount. Click again to unmount.</p>
    <button type="button" id="trigger">View payment</button>
    <div id="mount"></div>

    <script type="module">
      import { attach, onTrigger } from "mountly/attach";
      import { paymentBreakdown } from "payment-breakdown";

      const triggerEl = document.getElementById("trigger");
      attach(paymentBreakdown, {
        trigger: triggerEl,
        mount: document.getElementById("mount"),
        preloadOn: onTrigger.hover(triggerEl, { delay: 100 }),
        activateOn: onTrigger.click(triggerEl),
        props: {
          data: {
            total: 99,
            currency: "USD",
            items: [{ description: "Pro plan", amount: 99, currency: "USD" }],
          },
        },
      });
    </script>
  </body>
</html>
