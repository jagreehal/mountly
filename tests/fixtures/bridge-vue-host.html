<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="/tests/fixtures/bridge-tokens.css" />
    <script type="importmap">
      {
        "imports": {
          "vue": "https://esm.sh/vue@3.5.13",
          "mountly": "/packages/mountly/dist/index.js",
          "mountly/shadow": "/packages/mountly/dist/shadow.js",
          "mountly/assets": "/packages/mountly/dist/assets.js",
          "mountly/adapter": "/packages/mountly/dist/adapter.js",
          "mountly/attach": "/packages/mountly/dist/attach.js",
          "mountly/bundle": "/packages/mountly/dist/bundle.js",
          "mountly/elements": "/packages/mountly/dist/elements.js",
          "mountly/island": "/packages/mountly/dist/island.js",
          "mountly/mount": "/packages/mountly/dist/mount.js",
          "mountly/runtime": "/packages/mountly/dist/runtime.js",
          "mountly/triggers": "/packages/mountly/dist/triggers.js",
          "mountly/url": "/packages/mountly/dist/url-state.js",
          "mountly/data": "/packages/mountly/dist/data-source.js",
          "mountly/bus": "/packages/mountly/dist/bus.js"
        }
      }
    </script>
  </head>
  <body>
    <button id="t-hero">hero</button>
    <button id="t-pricing">pricing</button>
    <button id="t-newsletter">newsletter</button>
    <div id="m-hero"></div>
    <div id="m-pricing"></div>
    <div id="m-newsletter"></div>
    <div id="direct-vue"></div>

    <script type="module">
      import { createApp, h } from "vue";
      import { createWidgetBundle } from "mountly/bundle";
      import { __clearCssTextCache } from "mountly/assets";
      import { attach, onTrigger } from "mountly/attach";
      __clearCssTextCache();

      // Path 1: consume the pure Vue library DIRECTLY via createApp.
      // Same code path you'd use inside a Nuxt or Vite + Vue app.
      const ui = await import("/tests/fixtures/bridge-pure-vue-lib.js");
      createApp({
        render: () =>
          h(ui.Card, { tone: "primary", title: "Direct" }, () =>
            h(
              ui.Button,
              { variant: "primary", "data-testid": "direct-button" },
              () => "Used directly, no mountly",
            ),
          ),
      }).mount("#direct-vue");

      // Path 2: same library via the mountly bridge.
      const widgets = createWidgetBundle({
        moduleUrl: "/tests/fixtures/bridge-vue-widgets.js",
        assetOptions: { css: "none" },
      });

      const tHero = document.getElementById("t-hero");
      const tPricing = document.getElementById("t-pricing");
      const tNewsletter = document.getElementById("t-newsletter");
      attach(widgets.feature({ moduleId: "vue-hero", export: "hero" }), {
        trigger: tHero,
        mount: document.getElementById("m-hero"),
        activateOn: onTrigger.click(tHero),
        props: {
          headline: "Same UI library, two ways.",
          ctaLabel: "Get started",
          ctaHref: "/start",
        },
      });
      attach(widgets.feature({ moduleId: "vue-pricing", export: "pricing" }), {
        trigger: tPricing,
        mount: document.getElementById("m-pricing"),
        activateOn: onTrigger.click(tPricing),
        props: { plan: "Pro", price: 29, blurb: "Everything in Free, plus" },
      });
      attach(widgets.feature({ moduleId: "vue-newsletter", export: "newsletter" }), {
        trigger: tNewsletter,
        mount: document.getElementById("m-newsletter"),
        activateOn: onTrigger.click(tNewsletter),
        props: { buttonLabel: "Subscribe" },
      });

      document.getElementById("t-hero").click();
      document.getElementById("t-pricing").click();
      document.getElementById("t-newsletter").click();

      import("/tests/fixtures/bridge-vue-widgets.js").then((m) => {
        window.__bridge = m;
      });

      window.__ready = () => {
        if (!window.__bridge) return false;
        const direct = document.getElementById("direct-vue").querySelector(".ui-btn");
        const heroM = document.getElementById("m-hero");
        const heroCta = heroM.querySelector('[data-testid="hero-cta"]');
        const pricingM = document.getElementById("m-pricing");
        const newsletterM = document.getElementById("m-newsletter");
        const newsletterBtn = newsletterM.querySelector(".ui-btn-default");
        if (!direct || !heroCta || !pricingM.querySelector(".ui-card") || !newsletterBtn)
          return false;
        window.__result = {
          bridgeId: window.__bridge.__bridge_id,
          directRendered: !!direct,
          directButtonText: direct.textContent,
          directButtonColor: getComputedStyle(direct).backgroundColor,
          shadowRoots: [heroM, pricingM, newsletterM].map((m) => !!m.shadowRoot),
          heroCtaTag: heroCta.tagName.toLowerCase(),
          heroCtaHref: heroCta.getAttribute("href"),
          heroCtaColor: getComputedStyle(heroCta).backgroundColor,
          newsletterButtonColor: getComputedStyle(newsletterBtn).backgroundColor,
          bridgeFetchCount: performance.getEntriesByName(
            new URL("/tests/fixtures/bridge-vue-widgets.js", location.origin).href,
            "resource",
          ).length,
        };
        return true;
      };
    </script>
  </body>
</html>
