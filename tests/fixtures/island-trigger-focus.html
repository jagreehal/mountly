<!doctype html>
<html><body>
  <div id="island" data-mountly-island='{"schemaVersion":1,"id":"focus-test","moduleId":"demo","trigger":"focus","props":{"msg":"loaded"}}' tabindex="0">
    <span class="ssr">Click to focus</span>
  </div>
  <script type="module">
    import { mountIslandFeature } from "/packages/mountly/dist/index.js";
    const island = document.getElementById("island");
    const widgetModule = {
      mount(container) {
        const span = document.createElement("span");
        span.className = "loaded";
        span.textContent = "Loaded via focus";
        container.appendChild(span);
      },
      unmount() {},
    };
    mountIslandFeature(island, { demo: async () => ({ default: widgetModule }) });

    // Simulate focus
    setTimeout(() => {
      island.focus();
    }, 50);

    window.__result = {
      hasLoaded: null
    };

    setTimeout(() => {
      window.__result.hasLoaded = !!island.querySelector('.loaded');
    }, 200);
  </script>
</body></html>
