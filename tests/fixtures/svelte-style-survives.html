<!doctype html>
<html><body>
  <div id="c"></div>
  <script type="importmap">{"imports":{"mountly":"/packages/mountly/dist/index.js"}}</script>
  <script type="module">
    import { createWidget } from "/packages/adapters/mountly-svelte/dist/index.js";

    class CounterComponent {
      constructor({ target, props }) {
        this.el = document.createElement("span");
        this.el.textContent = String(props?.n ?? "");
        target.appendChild(this.el);
      }
      $destroy() {
        this.el?.remove();
      }
    }

    const w = createWidget(CounterComponent, { styles: ".x{ color: red }" });
    const c = document.getElementById("c");
    w.mount(c, { n: 1 });
    w.mount(c, { n: 2 });
    const root = c.shadowRoot;
    window.__result = {
      styleStillPresent:
        !!root.querySelector("style") ||
        (root.adoptedStyleSheets && root.adoptedStyleSheets.length > 0),
    };
  </script>
</body></html>
