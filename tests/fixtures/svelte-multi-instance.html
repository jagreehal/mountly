<!doctype html>
<html><body>
  <div id="a"></div>
  <div id="b"></div>
  <script type="importmap">
    {"imports":{"mountly":"/packages/mountly/dist/index.js"}}
  </script>
  <script type="module">
    import { createWidget } from "/packages/adapters/mountly-svelte/dist/index.js";

    class HelloComponent {
      constructor({ target, props }) {
        const el = document.createElement("span");
        el.textContent = String(props?.msg ?? "");
        target.appendChild(el);
        this.el = el;
      }
      $destroy() { this.el?.remove(); }
    }

    const w = createWidget(HelloComponent, { styles: ".shared{}" });
    const a = document.getElementById("a");
    const b = document.getElementById("b");
    w.mount(a, { msg: "alpha" });
    w.mount(b, { msg: "beta" });
    w.unmount(a);

    window.__result = {
      aTextAfter: a.shadowRoot.querySelector("[data-mountly-root]")?.textContent ?? "",
      bText: b.shadowRoot.querySelector("[data-mountly-root]")?.textContent ?? "",
      aHasShadow: !!a.shadowRoot,
      bHasShadow: !!b.shadowRoot,
    };
  </script>
</body></html>
