<!doctype html>
<html><body>
  <div id="c"></div>
  <script type="importmap">
    {"imports":{"mountly":"/packages/mountly/dist/index.js"}}
  </script>
  <script type="module">
    import { createWidget } from "/packages/adapters/mountly-tsrx/dist/index.js";

    let updateCount = 0;
    const w = createWidget({
      render(target, props) {
        target.textContent = props.msg;

        return {
          update(nextProps) {
            updateCount += 1;
            target.textContent = nextProps.msg;
          },
        };
      },
    });

    const c = document.getElementById("c");
    w.mount(c, { msg: "a" });
    w.update(c, { msg: "b" });
    await new Promise(r => setTimeout(r, 50));

    window.__result = {
      text: c.shadowRoot?.querySelector("[data-mountly-root]")?.textContent ?? "",
      updateCount,
    };
  </script>
</body></html>
