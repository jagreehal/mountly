<!doctype html>
<html>
  <body>
    <div id="c"></div>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client",
          "react-dom": "https://esm.sh/react-dom@18",
          "mountly": "/packages/mountly/dist/index.js",
          "mountly/shadow": "/packages/mountly/dist/shadow.js",
          "mountly/assets": "/packages/mountly/dist/assets.js",
          "mountly/adapter": "/packages/mountly/dist/adapter.js",
          "mountly/attach": "/packages/mountly/dist/attach.js",
          "mountly/bundle": "/packages/mountly/dist/bundle.js",
          "mountly/elements": "/packages/mountly/dist/elements.js",
          "mountly/island": "/packages/mountly/dist/island.js",
          "mountly/mount": "/packages/mountly/dist/mount.js",
          "mountly/runtime": "/packages/mountly/dist/runtime.js",
          "mountly/triggers": "/packages/mountly/dist/triggers.js",
          "mountly/url": "/packages/mountly/dist/url-state.js",
          "mountly/data": "/packages/mountly/dist/data-source.js",
          "mountly/bus": "/packages/mountly/dist/bus.js"
        }
      }
    </script>
    <script type="module">
      import { createElement } from "react";
      import { createWidget } from "/packages/adapters/mountly-react/dist/index.js";

      const Hello = (props) => createElement("span", null, props.msg);
      const w = createWidget(Hello, { shadow: true, styles: ".x{}" });
      const c = document.getElementById("c");

      w.mount(c, { msg: "alive" });

      await new Promise((r) => setTimeout(r, 50));
      const root = c.shadowRoot;
      const before = root.querySelector("[data-mountly-root]")?.textContent ?? "";

      w.unmount(c);

      const mountAfterUnmount = root.querySelector("[data-mountly-root]");
      const textAfter = mountAfterUnmount?.textContent ?? "";

      w.mount(c, { msg: "reborn" });
      await new Promise((r) => setTimeout(r, 50));
      const textAfterRemount = c.shadowRoot.querySelector("[data-mountly-root]")?.textContent ?? "";

      window.__result = {
        before,
        textAfter,
        textAfterRemount,
      };
    </script>
  </body>
</html>
