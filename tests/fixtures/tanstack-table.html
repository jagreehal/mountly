<!doctype html>
<html><body>
  <button id="trigger">load table</button>
  <div id="mount"></div>
  <script type="importmap">
    {"imports":{
      "react":"https://esm.sh/react@19.2.5",
      "react/jsx-runtime":"https://esm.sh/react@19.2.5/jsx-runtime",
      "react-dom/client":"https://esm.sh/react-dom@19.2.5/client?deps=react@19.2.5",
      "react-dom":"https://esm.sh/react-dom@19.2.5?deps=react@19.2.5",
      "mountly":"/packages/mountly/dist/index.js","mountly/shadow":"/packages/mountly/dist/shadow.js","mountly/assets":"/packages/mountly/dist/assets.js","mountly/adapter":"/packages/mountly/dist/adapter.js","mountly/attach":"/packages/mountly/dist/attach.js","mountly/bundle":"/packages/mountly/dist/bundle.js","mountly/elements":"/packages/mountly/dist/elements.js","mountly/island":"/packages/mountly/dist/island.js","mountly/mount":"/packages/mountly/dist/mount.js","mountly/runtime":"/packages/mountly/dist/runtime.js","mountly/triggers":"/packages/mountly/dist/triggers.js","mountly/url":"/packages/mountly/dist/url-state.js","mountly/data":"/packages/mountly/dist/data-source.js","mountly/bus":"/packages/mountly/dist/bus.js" 
    }}
  </script>
  <script type="module">
    import { createOnDemandFeature } from "/packages/mountly/dist/index.js";
    import { attach, onTrigger } from "/packages/mountly/dist/attach.js";
    import { __clearCssTextCache } from "/packages/mountly/dist/assets.js";
    __clearCssTextCache();

    const feature = createOnDemandFeature({
      moduleId: "tanstack-table",
      moduleUrl: "/tests/fixtures/tanstack-table-widget.js",
    });
    attach(feature, {
      trigger: document.getElementById("trigger"),
      mount: document.getElementById("mount"),
      activateOn: onTrigger.click(document.getElementById("trigger")),
    });
    document.getElementById("trigger").click();

    window.__ready = () => {
      const c = document.getElementById("mount");
      const table = c?.shadowRoot?.querySelector("table.tanstack-table");
      if (!table) return false;
      const rows = Array.from(c.shadowRoot.querySelectorAll("tbody tr"));
      const headers = Array.from(c.shadowRoot.querySelectorAll("thead th"))
        .map((h) => h.textContent);
      window.__result = {
        hasShadowRoot: !!c.shadowRoot,
        headerLabels: headers,
        rowCount: rows.length,
        firstRowText: rows[0]?.textContent ?? "",
        firstRowDataAttr: rows[0]?.getAttribute("data-row-id"),
      };
      return true;
    };
  </script>
</body></html>
