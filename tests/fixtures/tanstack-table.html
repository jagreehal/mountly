<!doctype html>
<html><body>
  <button id="trigger">load table</button>
  <div id="mount"></div>
  <script type="importmap">
    {"imports":{
      "react":"https://esm.sh/react@19.2.5",
      "react/jsx-runtime":"https://esm.sh/react@19.2.5/jsx-runtime",
      "react-dom/client":"https://esm.sh/react-dom@19.2.5/client?deps=react@19.2.5",
      "react-dom":"https://esm.sh/react-dom@19.2.5?deps=react@19.2.5",
      "mountly":"/packages/mountly/dist/index.js"
    }}
  </script>
  <script type="module">
    import {
      createOnDemandFeature,
      __clearCssTextCache,
    } from "/packages/mountly/dist/index.js";
    __clearCssTextCache();

    const feature = createOnDemandFeature({
      moduleId: "tanstack-table",
      moduleUrl: "/tests/fixtures/tanstack-table-widget.js",
    });
    feature.attach({
      trigger: document.getElementById("trigger"),
      mountContainer: document.getElementById("mount"),
      activateOn: "click",
    });
    document.getElementById("trigger").click();

    window.__ready = () => {
      const c = document.getElementById("mount");
      const table = c?.shadowRoot?.querySelector("table.tanstack-table");
      if (!table) return false;
      const rows = Array.from(c.shadowRoot.querySelectorAll("tbody tr"));
      const headers = Array.from(c.shadowRoot.querySelectorAll("thead th"))
        .map((h) => h.textContent);
      window.__result = {
        hasShadowRoot: !!c.shadowRoot,
        headerLabels: headers,
        rowCount: rows.length,
        firstRowText: rows[0]?.textContent ?? "",
        firstRowDataAttr: rows[0]?.getAttribute("data-row-id"),
      };
      return true;
    };
  </script>
</body></html>
