<!doctype html>
<html><body>
  <div id="c"></div>
  <script type="importmap">
    {"imports":{"mountly":"/packages/mountly/dist/index.js"}}
  </script>
  <script type="module">
    import { createWidget } from "/packages/adapters/mountly-svelte/dist/index.js";

    // In this fixture we intentionally do not map "svelte" in importmap,
    // so auto-runtime loading should fail with an actionable error.
    function HelloComponent(target, props) {
      const el = document.createElement("span");
      el.textContent = String(props?.msg ?? "");
      target.appendChild(el);
      return { el };
    }

    const w = createWidget(HelloComponent, { styles: ".x{}" });
    let caught = "";
    try {
      await w.mount(document.getElementById("c"), { msg: "x" });
    } catch (e) {
      caught = e instanceof Error ? e.message : String(e);
    }

    window.__result = { caught };
  </script>
</body></html>
