<!doctype html>
<html><body>
  <button id="island" data-mountly-island='{"id":"rs1","moduleId":"demo","trigger":"click","preloadOn":false,"schemaVersion":1,"retry":1}'></button>
  <script type="module">
    import { mountIslandFeature } from "/packages/mountly/dist/index.js";
    const island = document.getElementById("island");
    let calls = 0;
    const mod = {
      mount(container) {
        const span = document.createElement("span");
        span.textContent = "ok";
        container.appendChild(span);
      },
      unmount() {},
    };
    mountIslandFeature(island, {
      demo: async () => {
        calls += 1;
        if (calls === 1) throw new Error("transient");
        return { default: mod };
      },
    });
    island.click();
    await Promise.resolve();
    await new Promise((resolve) => setTimeout(resolve, 0));
    window.__result = { calls, state: island.getAttribute("data-mountly-state"), text: island.textContent ?? "" };
  </script>
</body></html>
