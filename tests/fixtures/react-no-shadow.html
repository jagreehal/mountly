<html><body>
  <div id="c"></div>
  <script type="importmap">

  </script>
  <script type="module">
    import { createElement } from "react";
    import { createWidget } from "/packages/adapters/mountly-react/dist/index.js";

    const Hello = (props) => createElement("span", { className: "plain-widget" }, props.msg);
    const w = createWidget(Hello, { styles: ".plain-widget{color:rgb(12,34,56)}", shadow: false });
    const c = document.getElementById("c");
    w.mount(c, { msg: "plain" });

    await new Promise(r => setTimeout(r, 50));

    window.__result = {

      text: c.querySelector("[data-mountly-root]")?.textContent ?? "",
      computedColor: getComputedStyle(c.querySelector(".plain-widget")).color,
    };
