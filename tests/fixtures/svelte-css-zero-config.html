<!doctype html>
<html>
  <body>
    <button id="trigger">load</button>
    <div id="mount"></div>
    <script type="importmap">
      {
        "imports": {
          "mountly": "/packages/mountly/dist/index.js",
          "mountly/shadow": "/packages/mountly/dist/shadow.js",
          "mountly/assets": "/packages/mountly/dist/assets.js",
          "mountly/adapter": "/packages/mountly/dist/adapter.js",
          "mountly/attach": "/packages/mountly/dist/attach.js",
          "mountly/bundle": "/packages/mountly/dist/bundle.js",
          "mountly/elements": "/packages/mountly/dist/elements.js",
          "mountly/island": "/packages/mountly/dist/island.js",
          "mountly/mount": "/packages/mountly/dist/mount.js",
          "mountly/runtime": "/packages/mountly/dist/runtime.js",
          "mountly/triggers": "/packages/mountly/dist/triggers.js",
          "mountly/url": "/packages/mountly/dist/url-state.js",
          "mountly/data": "/packages/mountly/dist/data-source.js",
          "mountly/bus": "/packages/mountly/dist/bus.js"
        }
      }
    </script>
    <script type="module">
      import { createOnDemandFeature } from "/packages/mountly/dist/index.js";
      import { attach, onTrigger } from "/packages/mountly/dist/attach.js";
      import { __clearCssTextCache } from "/packages/mountly/dist/assets.js";
      __clearCssTextCache();

      // Zero-config: only `moduleId` + `moduleUrl`. mountly synthesises
      // loadModule + render and threads moduleUrl through so the Svelte adapter
      // adopts the sibling .css into the shadow root automatically.
      const feature = createOnDemandFeature({
        moduleId: "svelte-zc",
        moduleUrl: "/tests/fixtures/zero-config-svelte-widget.js",
      });
      attach(feature, {
        trigger: document.getElementById("trigger"),
        mount: document.getElementById("mount"),
        activateOn: onTrigger.click(document.getElementById("trigger")),
      });
      document.getElementById("trigger").click();

      window.__ready = () => {
        const c = document.getElementById("mount");
        const node = c?.shadowRoot?.querySelector(".styled-widget");
        if (!node) return false;
        window.__result = {
          hasShadowRoot: !!c.shadowRoot,
          text: node.textContent ?? "",
          computedColor: getComputedStyle(node).color,
          adoptedRuleCount: c.shadowRoot.adoptedStyleSheets[0]?.cssRules.length ?? 0,
        };
        return true;
      };
    </script>
  </body>
</html>
