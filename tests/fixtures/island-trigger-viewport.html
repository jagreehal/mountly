<!doctype html>
<html><body>
  <div style="height: 2000px;">
    <p>Scroll down to trigger viewport</p>
  </div>
  <div id="island" data-mountly-island='{"schemaVersion":1,"id":"viewport-test","moduleId":"demo","trigger":"viewport","props":{"msg":"loaded"}}'>
    <span class="ssr">Scroll to load me</span>
  </div>
  <script type="module">
    import { mountIslandFeature } from "/packages/mountly/dist/index.js";
    const island = document.getElementById("island");
    const widgetModule = {
      mount(container) {
        const span = document.createElement("span");
        span.className = "loaded";
        span.textContent = "Loaded via viewport trigger";
        container.appendChild(span);
      },
      unmount() {},
    };
    mountIslandFeature(island, { demo: async () => ({ default: widgetModule }) });

    // Simulate scrolling into view
    setTimeout(() => {
      island.scrollIntoView();
    }, 100);

    window.__result = {
      hasLoaded: null
    };

    setTimeout(() => {
      window.__result.hasLoaded = !!island.querySelector('.loaded');
    }, 300);
  </script>
</body></html>
