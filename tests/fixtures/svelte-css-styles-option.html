<!doctype html>
<html><body>
  <div id="c"></div>
  <script type="importmap">{"imports":{"mountly":"/packages/mountly/dist/index.js"}}</script>
  <script type="module">
    import { __clearCssTextCache } from "/packages/mountly/dist/index.js";
    import { createWidget } from "/packages/adapters/mountly-svelte/dist/index.js";
    __clearCssTextCache();

    class HelloComponent {
      constructor({ target, props }) {
        this.el = document.createElement("span");
        this.el.className = "styled-widget";
        this.el.textContent = String(props?.msg ?? "");
        target.appendChild(this.el);
      }
      $destroy() { this.el?.remove(); }
    }

    const widget = createWidget(HelloComponent, {
      styles: ".styled-widget{color:rgb(11, 22, 33)}",
    });
    const c = document.getElementById("c");
    await widget.mount(c, { msg: "literal" });

    const node = c.shadowRoot.querySelector(".styled-widget");
    window.__result = {
      hasShadowRoot: !!c.shadowRoot,
      text: node?.textContent ?? "",
      computedColor: node ? getComputedStyle(node).color : "",
    };
  </script>
</body></html>
