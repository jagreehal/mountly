<!doctype html>
<html><body>
  <div id="island" data-mountly-island='{"schemaVersion":1,"id":"pm","moduleId":"demo"}'></div>
  <script type="importmap">{"imports":{"mountly":"/packages/mountly/dist/index.js"}}</script>
  <script type="module">
    import { mountIslandFeature } from "/packages/mountly/dist/index.js";
    mountIslandFeature(document.getElementById("island"), { demo: async () => ({ default: { mount(c){ c.textContent='ok'; } } }) }, { perfMarks: true });
    document.getElementById("island").dispatchEvent(new CustomEvent("click", { bubbles:true }));
    document.getElementById("island").dispatchEvent(new CustomEvent("mountly:refresh", { bubbles:true }));
    setTimeout(() => {
      const marks = performance.getEntriesByType('mark').map((m) => m.name);
      window.__result = { marks };
    }, 0);
  </script>
</body></html>
