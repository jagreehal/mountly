<!doctype html>
<html>
  <body>
    <div id="c"></div>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://esm.sh/vue@3",
          "mountly": "/packages/mountly/dist/index.js",
          "mountly/shadow": "/packages/mountly/dist/shadow.js",
          "mountly/assets": "/packages/mountly/dist/assets.js",
          "mountly/adapter": "/packages/mountly/dist/adapter.js"
        }
      }
    </script>
    <script type="module">
      import { h } from "vue";
      import { __clearCssTextCache } from "/packages/mountly/dist/assets.js";
      import { createWidget } from "/packages/adapters/mountly-vue/dist/index.js";
      __clearCssTextCache();

      const Hello = {
        props: ["msg"],
        render() {
          return h("span", { class: "styled-widget" }, this.msg);
        },
      };

      const widget = createWidget(Hello, {
        shadow: true,
        styles: ".styled-widget{color:rgb(11, 22, 33)}",
      });
      const c = document.getElementById("c");
      await widget.mount(c, { msg: "literal" });

      const node = c.shadowRoot.querySelector(".styled-widget");
      window.__result = {
        hasShadowRoot: !!c.shadowRoot,
        text: node?.textContent ?? "",
        computedColor: node ? getComputedStyle(node).color : "",
      };
    </script>
  </body>
</html>
