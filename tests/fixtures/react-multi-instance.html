<!doctype html>
<html><body>
  <div id="a"></div>
  <div id="b"></div>
  <script type="importmap">
    {"imports":{"react":"https://esm.sh/react@18","react-dom/client":"https://esm.sh/react-dom@18/client","react-dom":"https://esm.sh/react-dom@18","mountly":"/packages/mountly/dist/index.js"}}
  </script>
  <script type="module">
    import { createElement } from "react";
    import { createWidget } from "/packages/adapters/mountly-react/dist/index.js";

    const Hello = (props) => createElement("span", null, props.msg);
    const w = createWidget(Hello, { styles: ".shared{}" });
    const a = document.getElementById("a");
    const b = document.getElementById("b");
    w.mount(a, { msg: "alpha" });
    w.mount(b, { msg: "beta" });

    await new Promise(r => setTimeout(r, 50));
    w.unmount(a);

    window.__result = {
      aTextAfter: a.shadowRoot?.querySelector("[data-mountly-root]")?.textContent ?? "",
      bText: b.shadowRoot?.querySelector("[data-mountly-root]")?.textContent ?? "",
      aHasShadow: !!a.shadowRoot,
      bHasShadow: !!b.shadowRoot,
    };
  </script>
</body></html>
