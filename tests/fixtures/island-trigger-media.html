<!doctype html>
<html><body>
  <style>
    @media (max-width: 600px) {
      body { --mobile: 1; }
    }
    @media (min-width: 601px) {
      body { --desktop: 1; }
    }
  </style>
  <div id="island" data-mountly-island='{"schemaVersion":1,"id":"media-test","moduleId":"demo","trigger":"media","activateOnMediaQuery":"(max-width: 600px)","props":{"msg":"loaded"}}'>
    <span class="ssr">Resize to trigger (needs max-width: 600px)</span>
  </div>
  <script type="module">
    import { mountIslandFeature, registerBuiltInPlugins } from "/packages/mountly/dist/index.js";
    registerBuiltInPlugins();
    const island = document.getElementById("island");
    const widgetModule = {
      mount(container) {
        const span = document.createElement("span");
        span.className = "loaded";
        span.textContent = "Loaded via media query";
        container.appendChild(span);
      },
      unmount() {},
    };
    mountIslandFeature(island, { demo: async () => ({ default: widgetModule }) });

    window.__result = {
      hasLoaded: null
    };

    setTimeout(() => {
      window.__result.hasLoaded = !!island.querySelector('.loaded');
    }, 200);
  </script>
</body></html>
