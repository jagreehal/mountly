<!doctype html>
<html><body>
  <div id="a"></div>
  <div id="b"></div>
  <script type="importmap">
    {"imports":{"mountly":"/packages/mountly/dist/index.js"}}
  </script>
  <script type="module">
    import { createWidget } from "/packages/adapters/mountly-tsrx/dist/index.js";

    const w = createWidget({
      mount(target, props) {
        target.textContent = props.msg;
      },
      unmount(target) {
        target.textContent = "";
      },
    }, { styles: ".shared{}" });

    const a = document.getElementById("a");
    const b = document.getElementById("b");
    w.mount(a, { msg: "alpha" });
    w.mount(b, { msg: "beta" });

    await new Promise(r => setTimeout(r, 50));
    w.unmount(a);

    window.__result = {
      aTextAfter: a.shadowRoot?.querySelector("[data-mountly-root]")?.textContent ?? "",
      bText: b.shadowRoot?.querySelector("[data-mountly-root]")?.textContent ?? "",
      aHasShadow: !!a.shadowRoot,
      bHasShadow: !!b.shadowRoot,
    };
  </script>
</body></html>
